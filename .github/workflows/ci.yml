# Java is installed in CI because PySpark requires the JVM.
# The same requirement applies in the Dockerfile for Azure deployment.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Java (required for PySpark)
        run: sudo apt-get install -y default-jdk

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v
