short_description: Upload two CSV columns, select a test, get a plain-English verdict. Five hypothesis tests with automatic assumption checking. Datasets above 50,000 rows route through PySpark automatically.

full_description: An interactive hypothesis testing tool that translates statistical results into plain English. Upload two CSV columns, select one of five tests, and get a verdict any non-statistician can act on — "There IS a statistically significant difference" or "There IS NOT" — with the p-value, test statistic, assumption check results, and a distribution plot.\n\nFive tests are supported: independent t-test, Welch's t-test, paired t-test, Mann-Whitney U, and chi-square. Before running any parametric test the app checks normality (Shapiro-Wilk) and equal variance (Levene's test) and recommends an alternative if assumptions are violated.\n\nThe routing logic is the portfolio centrepiece: datasets below 50,000 rows use pandas and scipy; above that threshold the computation routes through PySpark running in local[*] mode. The statistical question is identical — only the engine changes. PySpark reads the data, computes descriptive statistics and group summaries across all rows, then scipy computes the test statistic on a 10,000-row representative sample. This mirrors the standard production pattern: distributed data preparation, established statistical libraries for the test itself.\n\nThe app also accepts raw JSON arrays via a REST endpoint, making it testable without file uploads. Every result generates a two-panel distribution plot showing overlapping KDE curves and histograms on the left and side-by-side box plots on the right. The frontend includes a collapsible plain-English glossary covering 25 statistical terms, a "Which test should I use?" decision guide, and a "What are we testing for?" primer on hypothesis testing fundamentals. Deployed on Hugging Face Spaces via Docker with Java pre-installed in the image for PySpark.

problem: Statistics tools typically return raw numbers — p-values, test statistics, confidence intervals — and leave interpretation to the user. For non-statisticians this creates a gap between running an analysis and knowing what to do with the result. Separately, most Python data science portfolios demonstrate either pandas/scipy or PySpark, rarely both on the same problem. The challenge was to build a tool that closes both gaps: translate statistical output into plain-English conclusions a non-statistician can act on, and demonstrate that the same statistical question can be answered at any data scale by choosing the right computational tool.

solution: The plain-English verdict is generated from the p-value and alpha threshold using consistent sentence templates — "There IS / IS NOT a statistically significant difference (p = x, which is below/above the threshold of y)." — so the conclusion is always unambiguous. Assumption checking runs automatically before every parametric test and surfaces recommendations when violated. The 50,000-row routing threshold is hard-coded in config.py with a comment explaining the rationale: below it, Spark's JVM initialisation overhead (~3-5 seconds) makes pandas faster; above it, Spark's parallelism across all CPU cores pays off. PySpark handles all data ingestion, filtering, and descriptive statistics; scipy handles the test statistic on a sampled subset — an honest split that reflects how production pipelines actually work. The app is served via FastAPI, containerised with Docker (Java installed via apt-get for PySpark), and deployed on Hugging Face Spaces with a GitHub Actions CI pipeline running pytest on every push.

challenges: PySpark requires Java, which adds ~200MB to the Docker image and must be explicitly installed via apt-get in both the Dockerfile and the GitHub Actions CI workflow — a step that is easy to miss and produces a cryptic error at runtime if skipped. The PySpark initialisation overhead (~3-5 seconds on first request) makes it noticeably slower than pandas on small datasets, which required careful threshold calibration and clear documentation in the UI so users understand why the engine switches. Pydantic v2 changed how nullable fields are validated — fields typed as str with a default of None fail validation when None is returned; all nullable fields required explicit str | None = None type hints. scipy returns numpy.bool_ from comparison operations, which Pydantic v2 cannot serialise; every significant = p < alpha comparison required an explicit bool() cast. Chi-square with continuous data fails because the observed and expected frequency sums must match — fixed by auto-binning continuous data into shared histogram bins and using chi2_contingency on the resulting contingency table.

key_decisions:
  plain_english_output: Statistics is full of jargon that obscures simple conclusions. The verdict format was designed first — clear, consistent, always one sentence — and the code was written to produce it. Raw statistics are still shown for users who need them, but the conclusion is never buried.
  assumption_checking: Parametric tests produce unreliable p-values when their assumptions are violated. Automating the checks and surfacing recommendations mirrors what a careful statistician does before reporting results — and is what separates a useful tool from a raw computation.
  pyspark_threshold: The 50,000-row threshold reflects a real trade-off. Below it, Spark's JVM startup overhead makes it slower than pandas. Above it, parallelism across all available cores pays off. The threshold is documented in the UI so users understand the switch rather than being surprised by it.
  scipy_for_test_statistic: Spark does not have native hypothesis testing equivalent to scipy.stats. The honest production pattern is distributed computing for data scale plus established statistical libraries for the test itself. This split is documented explicitly in spark_engine.py, the notebook, and the README.
  five_tests: The five tests cover the most common two-group statistical questions in practice — comparing means (t-tests), handling non-normal data (Mann-Whitney), and testing categorical relationships (chi-square). Adding more tests would broaden scope without adding to the core demonstration.

